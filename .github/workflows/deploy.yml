name: Deploy Trade Engine Bot

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install pip and dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics || true
    
    - name: Run tests
      run: |
        pip install pytest
        pytest || true

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create .env file with IIFL credentials
      env:
        IIFL_USERNAME: ${{ secrets.IIFL_USERNAME }}
        IIFL_PASSWORD: ${{ secrets.IIFL_PASSWORD }}
        IIFL_VENDOR_KEY: ${{ secrets.IIFL_VENDOR_KEY }}
        IIFL_APP_SECRET: ${{ secrets.IIFL_APP_SECRET }}
        IIFL_API_KEY: ${{ secrets.IIFL_API_KEY }}
        IIFL_API_SECRET: ${{ secrets.IIFL_API_SECRET }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TRADING_MODE: ${{ secrets.TRADING_MODE || 'paper' }}
        SYMBOL: ${{ secrets.SYMBOL || 'NIFTY' }}
        TIMEFRAME: ${{ secrets.TIMEFRAME || '5' }}
        QUANTITY: ${{ secrets.QUANTITY || '1' }}
        DAILY_LOSS_LIMIT: ${{ secrets.DAILY_LOSS_LIMIT || '3000' }}
        LOG_LEVEL: ${{ secrets.LOG_LEVEL || 'INFO' }}
      run: |
        cat > .env << 'EOF'
        IIFL_USERNAME=${{ env.IIFL_USERNAME }}
        IIFL_PASSWORD=${{ env.IIFL_PASSWORD }}
        IIFL_VENDOR_KEY=${{ env.IIFL_VENDOR_KEY }}
        IIFL_APP_SECRET=${{ env.IIFL_APP_SECRET }}
        IIFL_API_KEY=${{ env.IIFL_API_KEY }}
        IIFL_API_SECRET=${{ env.IIFL_API_SECRET }}
        TELEGRAM_BOT_TOKEN=${{ env.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID=${{ env.TELEGRAM_CHAT_ID }}
        TRADING_MODE=${{ env.TRADING_MODE }}
        SYMBOL=${{ env.SYMBOL }}
        TIMEFRAME=${{ env.TIMEFRAME }}
        QUANTITY=${{ env.QUANTITY }}
        DAILY_LOSS_LIMIT=${{ env.DAILY_LOSS_LIMIT }}
        LOG_LEVEL=${{ env.LOG_LEVEL }}
        EOF
    
    - name: Validate Configuration
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python << 'VALIDATION_SCRIPT'
import sys
import os
from dotenv import load_dotenv

load_dotenv()

print('🔍 Validating Configuration...')
print()

errors = []

# Check required environment variables
required_vars = {
    'IIFL_USERNAME': 'IIFL Username',
    'IIFL_PASSWORD': 'IIFL Password',
    'IIFL_VENDOR_KEY': 'IIFL Vendor Key',
    'IIFL_APP_SECRET': 'IIFL App Secret',
    'TELEGRAM_BOT_TOKEN': 'Telegram Bot Token',
    'TELEGRAM_CHAT_ID': 'Telegram Chat ID',
}

for var, description in required_vars.items():
    value = os.getenv(var)
    if not value or value.strip() == '':
        errors.append(f'{description} not configured')
    else:
        print(f'✅ {description} configured')

# Check optional trading config
trading_vars = {
    'TRADING_MODE': 'Trading Mode',
    'SYMBOL': 'Symbol',
    'TIMEFRAME': 'Timeframe',
    'QUANTITY': 'Quantity',
}

print()
print('📊 Trading Configuration:')
for var, description in trading_vars.items():
    value = os.getenv(var, 'Not set')
    print(f'   {description}: {value}')

if errors:
    print()
    print('❌ Configuration Errors:')
    for error in errors:
        print(f'   - {error}')
    sys.exit(1)

print()
print('✅ All configuration validated successfully!')
VALIDATION_SCRIPT
    
    - name: Send Deployment Notification to Telegram
      if: always()
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python << 'TELEGRAM_SCRIPT'
import requests
import os

bot_token = os.getenv('TELEGRAM_BOT_TOKEN')
chat_id = os.getenv('TELEGRAM_CHAT_ID')

if not bot_token or not chat_id:
    print('⚠️ Telegram credentials not configured')
    exit(0)

message = """🚀 *SKY13 Trade Engine Bot - Deployment Started*

✅ *Configuration Validated*

📋 *Next Steps to Activate Bot:*

1️⃣ *Get IIFL AUTH_CODE:*
   - Visit: https://markets.iiflcapital.com/
   - Login with your credentials
   - Enter OTP
   - Look at redirect URL for auth_code parameter
   - Copy the AUTH_CODE value

2️⃣ *Send AUTH_CODE to Bot:*
   - Use command: /auth
   - Paste your AUTH_CODE when prompted
   - Confirm to establish connection

3️⃣ *Bot will establish:*
   ✅ IIFL Server connection
   ✅ API handshake
   ✅ Trading readiness confirmation

⏰ *Important:* AUTH_CODE expires in 15 minutes

🔐 Waiting for your AUTH_CODE...
"""

url = f'https://api.telegram.org/bot{bot_token}/sendMessage'
payload = {
    'chat_id': chat_id,
    'text': message,
    'parse_mode': 'Markdown'
}

try:
    response = requests.post(url, json=payload, timeout=10)
    if response.status_code == 200:
        print('✅ Telegram notification sent successfully')
    else:
        print(f'⚠️ Telegram notification failed: {response.status_code}')
        print(response.text)
except Exception as e:
    print(f'⚠️ Could not send Telegram notification: {e}')
TELEGRAM_SCRIPT
    
    - name: Start Trade Engine
      run: |
        echo "🤖 Starting SKY13 Trade Engine..."
        echo "⏳ Waiting for IIFL AUTH_CODE via Telegram..."
        echo ""
        echo "📱 Send /auth command in Telegram to begin authentication"
        echo "⏰ Deployment will wait for your AUTH_CODE submission"
        echo ""
        python main.py || true
      timeout-minutes: 30
      continue-on-error: true
    
    - name: Deployment Complete
      run: |
        echo "✅ Deployment workflow completed"
        echo ""
        echo "📌 Bot Status:"
        echo "- Configuration: ✅ Valid"
        echo "- IIFL Base URL: https://markets.iiflcapital.com/"
        echo "- Waiting for IIFL AUTH_CODE via Telegram"
        echo ""
        echo "Next steps:"
        echo "1. Check Telegram for deployment message"
        echo "2. Get AUTH_CODE from IIFL portal"
        echo "3. Send /auth command with AUTH_CODE"
        echo "4. Confirm connection to establish handshake"
