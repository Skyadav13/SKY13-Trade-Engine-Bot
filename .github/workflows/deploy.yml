name: Deploy Trade Engine Bot

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt flake8 pytest
    
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    
    - name: Run tests
      run: |
        pytest

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4

    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd /path/to/your/bot/directory
          git pull origin main
          source venv/bin/activate
          pip install -r requirements.txt
          
          # Safely rewrite the production .env file on your host machine
          cat << 'EOF' > .env
          IIFL_USERNAME=${{ secrets.IIFL_USERNAME }}
          IIFL_PASSWORD=${{ secrets.IIFL_PASSWORD }}
          IIFL_VENDOR_KEY=${{ secrets.IIFL_VENDOR_KEY }}
          IIFL_APP_SECRET=${{ secrets.IIFL_APP_SECRET }}
          IIFL_API_SECRET=${{ secrets.IIFL_API_SECRET }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          TRADING_MODE=${{ secrets.TRADING_MODE || 'paper' }}
          SYMBOL=${{ secrets.SYMBOL || 'NIFTY' }}
          TIMEFRAME=${{ secrets.TIMEFRAME || '5' }}
          QUANTITY=${{ secrets.QUANTITY || '1' }}
          DAILY_LOSS_LIMIT=${{ secrets.DAILY_LOSS_LIMIT || '3000' }}
          LOG_LEVEL=${{ secrets.LOG_LEVEL || 'INFO' }}
          EOF

          # Run validation
          python validate_config.py

          # Restart the engine in the background so it runs forever
          # Using pm2 (recommended for logs and auto-restarts)
          pm2 restart trade-engine || pm2 start main.py --name "trade-engine" --interpreter python3
          
          # Alternative if not using pm2: 
          # pkill -f main.py || true && nohup python main.py > bot.log 
          2>&1 &
