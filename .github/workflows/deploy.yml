name: Deploy Trade Engine Bot

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install uv installer
      run: |
        python -m pip install --upgrade pip
        python -m pip install uv

    - name: Install dependencies using uv
      run: |
        uv pip install --system -r requirements.txt
    
    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Run tests
      run: |
        pip install pytest
        pytest || true

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12' # Upgraded to match test job and prevent requirement conflicts
    
    - name: Install uv installer
      run: |
        python -m pip install --upgrade pip
        python -m pip install uv

    - name: Install dependencies
      run: |
        uv pip install --system -r requirements.txt
    
   # - name: Create .env file
    # run: |
    #    echo "API_KEY=${{ secrets.API_KEY }}" >> .env
     #   echo "API_SECRET=${{ secrets.API_SECRET }}" >> .env
     #   echo "BROKER_URL=${{ secrets.BROKER_URL }}" >> .env
      #  echo "LOG_LEVEL=${{ secrets.LOG_LEVEL }}" >> .env
        - name: Run Trading Bot
      env:
        # Pass your API keys securely via GitHub Secrets
        
        IIFL_APP_SECRET: ${{ secrets.IIFL_APP_SECRET }}
        IIFL_VENDOR_KEY: ${{ secrets.IIFL_VENDOR_KEY }}
        IIFL_PASSWORD: ${{ secrets.IIFL_PASSWORD }}
        IIFL_CLIENT_ID: ${{ secrets.IIFL_CLIENT_ID }}
        SESSION_SECRET: ${{ secrets.SESSION_SECRET }}




        
        # Inject your Telegram Keys (Make sure names match your GitHub Secrets exactly)
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }} 
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    - name: Run bot
      run: |
        python main.py
        
